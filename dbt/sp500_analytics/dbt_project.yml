name: "sp500_analytics"
version: "1.0.0"
config-version: 2

profile: "sp500_analytics"

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
macro-paths: ["macros"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  sp500_analytics:
    staging:
      +materialized: view
      +schema: silver
    intermediate:
      +materialized: view
      +schema: silver
    marts:
      +materialized: table
      +schema: gold

seeds:
  sp500_analytics:
    # Seeds are raw reference inputs, not Gold marts — keep them in bronze so the
    # Fabric mirror (which surfaces only the gold schema) shows marts only.
    +schema: bronze
