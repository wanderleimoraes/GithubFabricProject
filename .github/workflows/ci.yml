name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    env:
      DATA_DIR: ${{ github.workspace }}/data
      DBT_PROFILES_DIR: ${{ github.workspace }}/dbt/sp500_analytics/ci
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check ingestion extraction nl_query scripts

      # CI verifies the transformation layer deterministically. Live ingestion
      # (Wikipedia/SEC/yfinance) is exercised manually/locally, not in CI, to keep
      # the pipeline build reproducible and independent of external services.
      - name: Generate sample Bronze data
        run: python -m scripts.generate_sample_bronze

      - name: dbt build against DuckDB
        working-directory: dbt/sp500_analytics
        run: |
          dbt seed --target duckdb
          dbt build --target duckdb

      - name: dbt docs generate
        working-directory: dbt/sp500_analytics
        run: dbt docs generate --target duckdb
